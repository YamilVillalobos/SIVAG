<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Panel — SIVAG</title>
  <link rel="stylesheet" href="css/sivag.css" />
  <style>
    .sv-panel-page {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .sv-panel-header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border-dim);
      margin-bottom: 32px;
    }

    .sv-proyecto-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      transition: var(--transition);
    }

    .sv-proyecto-row:hover {
      border-color: rgba(0, 212, 255, 0.25);
    }

    .sv-proyecto-row-thumb {
      width: 56px; height: 56px;
      border-radius: var(--radius-md);
      background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sv-proyecto-row-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .sv-proyecto-row-info {
      flex: 1;
      min-width: 0;
    }

    .sv-proyecto-row-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .sv-proyecto-row-meta {
      display: flex;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .sv-proyecto-row-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .sv-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .sv-modal {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      position: relative;
      animation: fadeInUp 0.25s ease;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
    }

    .sv-modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }

    .sv-modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: color 0.2s;
    }

    .sv-modal-close:hover { color: var(--text-primary); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="sv-bg-grid"></div>
  <div class="sv-bg-orb sv-bg-orb-1"></div>
  <div class="sv-bg-orb sv-bg-orb-2"></div>

  <!-- NAVBAR -->
  <nav class="sv-navbar" id="sv-main-navbar">
    <a href="index.html" class="sv-navbar-logo">
      <img src="assets/logo.svg" alt="SIVAG" />
    </a>
    <ul class="sv-navbar-nav" id="sv-navbar-nav"></ul>
    <div id="sv-user-badge-wrap"></div>
    <button class="sv-navbar-toggler" id="sv-navbar-toggler">☰</button>
  </nav>

  <div class="sv-panel-page">
    <div style="max-width:1200px;margin:0 auto;padding:0 2rem;">

      <!-- HEADER -->
      <div class="sv-panel-header sv-page" id="sv-panel-header">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
          <div>
            <span class="sv-eyebrow">Panel del investigador</span>
            <h1 class="sv-section-title" id="sv-panel-title">Bienvenido</h1>
            <p style="color:var(--text-secondary);font-size:13px;margin-top:4px;" id="sv-panel-subtitle">
              Gestiona tus proyectos geoespaciales
            </p>
          </div>
          <button class="sv-btn sv-btn-primary" id="sv-new-proyecto-btn">
            + Nuevo proyecto
          </button>
        </div>
      </div>

      <!-- MÉTRICAS -->
      <div class="sv-stats-row sv-page" id="sv-stats-row">
        <div class="sv-stat-card sv-skeleton" style="height:80px;"></div>
        <div class="sv-stat-card sv-skeleton" style="height:80px;"></div>
        <div class="sv-stat-card sv-skeleton" style="height:80px;"></div>
        <div class="sv-stat-card sv-skeleton" style="height:80px;"></div>
      </div>

      <!-- FILTROS -->
      <div class="sv-filter-bar" style="margin-bottom:16px;">
        <div style="flex:1;min-width:160px;">
          <div class="sv-input-icon">
            <span class="sv-icon" style="font-size:12px;">🔍</span>
            <input type="text" id="sv-panel-search" class="sv-input" placeholder="Buscar mis proyectos..." style="padding-left:36px;" />
          </div>
        </div>
        <select id="sv-vis-filter" class="sv-filter-select">
          <option value="">Todos</option>
          <option value="PUBLICO">Públicos</option>
          <option value="PRIVADO">Privados</option>
        </select>
        <select id="sv-cat-filter" class="sv-filter-select">
          <option value="">Categorías</option>
          <option value="CLIMA">Clima</option>
          <option value="FAUNA">Fauna</option>
          <option value="AGUA">Agua</option>
          <option value="SUELO">Suelo</option>
          <option value="VEGETACION">Vegetación</option>
          <option value="ATMOSFERA">Atmósfera</option>
          <option value="OTRO">Otro</option>
        </select>
      </div>

      <div id="sv-panel-alert"></div>

      <!-- LISTA DE PROYECTOS -->
      <div id="sv-proyectos-list"></div>

      <!-- PAGINACIÓN -->
      <div class="sv-pagination" id="sv-panel-pagination"></div>

      <div style="height:60px;"></div>
    </div>
  </div>

  <!-- MODAL: Nuevo / Editar proyecto -->
  <div id="sv-modal-overlay" style="display:none;">
    <div class="sv-modal-overlay">
      <div class="sv-modal">
        <button class="sv-modal-close" id="sv-modal-close-btn">×</button>
        <h2 style="font-family:var(--font-display);font-size:18px;color:var(--text-primary);margin-bottom:4px;" id="sv-modal-title">
          Nuevo proyecto
        </h2>
        <p style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:24px;">
          Completa los metadatos del proyecto
        </p>

        <div id="sv-modal-alert"></div>

        <form id="sv-proyecto-form" novalidate>
          <input type="hidden" id="sv-proyecto-id" />

          <div class="sv-form-group">
            <label class="sv-label" for="proj-titulo">Título del proyecto</label>
            <input type="text" id="proj-titulo" class="sv-input" placeholder="Ej: Distribución de anfibios en la Sierra Madre" required />
            <span class="sv-field-error" id="titulo-error" data-error="titulo"></span>
          </div>

          <div class="sv-form-group">
            <label class="sv-label" for="proj-categoria">Categoría</label>
            <select id="proj-categoria" class="sv-input sv-filter-select" style="width:100%;" required>
              <option value="">Selecciona una categoría</option>
              <option value="CLIMA">Clima</option>
              <option value="FAUNA">Fauna</option>
              <option value="AGUA">Agua</option>
              <option value="SUELO">Suelo</option>
              <option value="VEGETACION">Vegetación</option>
              <option value="ATMOSFERA">Atmósfera</option>
              <option value="OTRO">Otro</option>
            </select>
            <span class="sv-field-error" id="categoria-error" data-error="categoria"></span>
          </div>

          <div class="sv-form-group">
            <label class="sv-label" for="proj-descripcion">Descripción</label>
            <textarea id="proj-descripcion" class="sv-input" rows="3" placeholder="Describe el objetivo y metodología del proyecto..." style="resize:vertical;"></textarea>
            <span class="sv-field-error" id="descripcion-error" data-error="descripcion"></span>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="sv-form-group">
              <label class="sv-label" for="proj-fecha-inicio">Fecha inicio</label>
              <input type="date" id="proj-fecha-inicio" class="sv-input" />
            </div>
            <div class="sv-form-group">
              <label class="sv-label" for="proj-fecha-fin">Fecha fin</label>
              <input type="date" id="proj-fecha-fin" class="sv-input" />
            </div>
          </div>

          <div class="sv-form-group">
            <label class="sv-label" for="proj-etiquetas">Etiquetas (separadas por comas)</label>
            <input type="text" id="proj-etiquetas" class="sv-input" placeholder="biodiversidad, SIG, México" />
          </div>

          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="button" class="sv-btn sv-btn-ghost" id="sv-modal-cancel-btn" style="flex:0 0 auto;">
              Cancelar
            </button>
            <button type="submit" class="sv-btn sv-btn-primary sv-btn-block" id="sv-modal-submit-btn">
              Guardar proyecto
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { renderNavbar, showAlert, clearAlert, showFieldErrors, clearFieldErrors, setButtonLoading, formatDate, formatNumber } from './js/ui.js';
    import { Router } from './js/router.js';
    import { Auth } from './js/auth.js';
    import { API } from './js/api.js';

    // Proteger ruta
    if (!Router.requireRole(['INVESTIGADOR', 'ADMIN'])) throw new Error('Unauthorized');

    renderNavbar();

    const user = Auth.getUser();
    document.getElementById('sv-panel-title').textContent  = `Hola, ${user?.nombre_completo || user?.username || 'investigador'}`;

    const CATEGORY_ICONS  = { CLIMA:'🌤', FAUNA:'🦎', AGUA:'💧', SUELO:'🌍', VEGETACION:'🌿', ATMOSFERA:'🌬', OTRO:'◈' };
    const CATEGORY_LABELS = { CLIMA:'Clima', FAUNA:'Fauna', AGUA:'Agua', SUELO:'Suelo', VEGETACION:'Vegetación', ATMOSFERA:'Atmósfera', OTRO:'Otro' };
    const CATEGORY_COLORS = { CLIMA:'cyan', FAUNA:'green', AGUA:'teal', SUELO:'amber', VEGETACION:'green', ATMOSFERA:'cyan', OTRO:'dim' };

    let state = { page: 1, pageSize: 10, q: '', visibilidad: '', categoria: '', ordering: '-fecha_actualizacion' };
    let searchTimer;

    // ── Cargar datos ──────────────────────────────────────────────
    async function loadPanel() {
      try {
        const qp = new URLSearchParams({
          page: state.page, page_size: state.pageSize, ordering: state.ordering,
        });
        if (state.q)           qp.set('q', state.q);
        if (state.visibilidad) qp.set('visibilidad', state.visibilidad);
        if (state.categoria)   qp.set('categoria', state.categoria);

        const data = await API.get(`/api/proyectos/mis/?${qp}`);

        renderMetrics(data.metricas || {});
        renderProyectos(data.results || []);
        renderPaginacion(data.total || 0, data.pages || 1);
      } catch (err) {
        showAlert('sv-panel-alert', err.message || 'Error al cargar proyectos.', 'error');
      }
    }

    function renderMetrics(m) {
      document.getElementById('sv-stats-row').innerHTML = `
        <div class="sv-stat-card sv-stat-accent-cyan">
          <div class="sv-stat-value">${m.total_proyectos ?? 0}</div>
          <div class="sv-stat-label">Total proyectos</div>
        </div>
        <div class="sv-stat-card sv-stat-accent-green">
          <div class="sv-stat-value">${m.publicados ?? 0}</div>
          <div class="sv-stat-label">Publicados</div>
        </div>
        <div class="sv-stat-card">
          <div class="sv-stat-value">${m.privados ?? 0}</div>
          <div class="sv-stat-label">Privados</div>
        </div>
        <div class="sv-stat-card sv-stat-accent-teal">
          <div class="sv-stat-value">${formatNumber(m.total_features ?? 0)}</div>
          <div class="sv-stat-label">Features geo</div>
        </div>
      `;
    }

    function renderProyectos(proyectos) {
      const list = document.getElementById('sv-proyectos-list');
      if (!proyectos.length) {
        list.innerHTML = `
          <div style="text-align:center;padding:48px 20px;color:var(--text-muted);">
            <div style="font-size:40px;margin-bottom:12px;opacity:0.4;">🗺</div>
            <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:1px;">
              ${state.q || state.visibilidad || state.categoria ? 'Sin resultados para este filtro.' : 'Aún no tienes proyectos. ¡Crea el primero!'}
            </p>
          </div>
        `;
        return;
      }

      list.innerHTML = proyectos.map(p => {
        const cat   = p.categoria || 'OTRO';
        const icon  = CATEGORY_ICONS[cat] || '◈';
        const color = CATEGORY_COLORS[cat] || 'dim';
        const label = CATEGORY_LABELS[cat] || cat;
        const isPublic = p.visibilidad === 'PUBLICO';

        return `
          <div class="sv-proyecto-row">
            <div class="sv-proyecto-row-thumb">
              ${p.thumbnail ? `<img src="${p.thumbnail}" alt="" />` : icon}
            </div>
            <div class="sv-proyecto-row-info">
              <div class="sv-proyecto-row-title">${escapeHtml(p.titulo)}</div>
              <div class="sv-proyecto-row-meta">
                <span class="sv-tag sv-tag-${color}">${icon} ${label}</span>
                <span>${p.num_capas || 0} capas</span>
                <span>${formatNumber(p.total_features || 0)} features</span>
                <span>Act. ${formatDate(p.fecha_actualizacion)}</span>
              </div>
            </div>
            <div class="sv-proyecto-row-actions">
              <!-- Toggle visibilidad -->
              <label class="sv-toggle sv-toggle-wrap" title="${isPublic ? 'Público' : 'Privado'}">
                <input type="checkbox" ${isPublic ? 'checked' : ''} data-toggle-id="${p.id}" />
                <span class="sv-toggle-slider"></span>
              </label>
              <button class="sv-btn sv-btn-ghost sv-btn-sm" data-edit-id="${p.id}" title="Editar">✎</button>
              <button class="sv-btn sv-btn-danger sv-btn-sm" data-delete-id="${p.id}" title="Eliminar">✕</button>
            </div>
          </div>
        `;
      }).join('');

      // Toggle eventos
      list.querySelectorAll('[data-toggle-id]').forEach(chk => {
        chk.addEventListener('change', async () => {
          try {
            await API.post(`/api/proyectos/${chk.dataset.toggleId}/toggle/`, {});
          } catch (err) {
            showAlert('sv-panel-alert', err.message, 'error');
            chk.checked = !chk.checked; // revertir
          }
        });
      });

      // Edit eventos
      list.querySelectorAll('[data-edit-id]').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.editId, proyectos));
      });

      // Delete eventos
      list.querySelectorAll('[data-delete-id]').forEach(btn => {
        btn.addEventListener('click', () => confirmDelete(btn.dataset.deleteId));
      });
    }

    function renderPaginacion(total, pages) {
      const el = document.getElementById('sv-panel-pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      let html = `<button class="sv-page-btn" ${state.page <= 1 ? 'disabled' : ''} id="pp-prev">←</button>`;
      for (let i = 1; i <= pages; i++) {
        html += `<button class="sv-page-btn ${i === state.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      html += `<button class="sv-page-btn" ${state.page >= pages ? 'disabled' : ''} id="pp-next">→</button>`;
      el.innerHTML = html;

      el.querySelectorAll('[data-page]').forEach(b => {
        b.addEventListener('click', () => { state.page = +b.dataset.page; loadPanel(); });
      });
      document.getElementById('pp-prev')?.addEventListener('click', () => { if (state.page > 1) { state.page--; loadPanel(); } });
      document.getElementById('pp-next')?.addEventListener('click', () => { if (state.page < pages) { state.page++; loadPanel(); } });
    }

    // ── Modal Nuevo / Editar ──────────────────────────────────────
    function openModal(title = 'Nuevo proyecto') {
      document.getElementById('sv-modal-title').textContent = title;
      document.getElementById('sv-modal-overlay').style.display = 'block';
      clearAlert('sv-modal-alert');
      clearFieldErrors('sv-proyecto-form');
    }

    function closeModal() {
      document.getElementById('sv-modal-overlay').style.display = 'none';
      document.getElementById('sv-proyecto-form').reset();
      document.getElementById('sv-proyecto-id').value = '';
    }

    function openEditModal(id, proyectos) {
      const p = proyectos.find(x => x.id === id);
      if (!p) return;
      document.getElementById('sv-proyecto-id').value     = id;
      document.getElementById('proj-titulo').value         = p.titulo || '';
      document.getElementById('proj-categoria').value      = p.categoria || '';
      document.getElementById('proj-descripcion').value    = p.descripcion || '';
      document.getElementById('proj-fecha-inicio').value   = p.fecha_inicio || '';
      document.getElementById('proj-fecha-fin').value      = p.fecha_fin || '';
      document.getElementById('proj-etiquetas').value      = Array.isArray(p.etiquetas) ? p.etiquetas.join(', ') : (p.etiquetas || '');
      openModal('Editar proyecto');
    }

    async function confirmDelete(id) {
      if (!confirm('¿Eliminar este proyecto? Esta acción oculta el proyecto del explorador.')) return;
      try {
        await API.delete(`/api/proyectos/${id}/`);
        showAlert('sv-panel-alert', 'Proyecto eliminado correctamente.', 'success');
        loadPanel();
      } catch (err) {
        showAlert('sv-panel-alert', err.message, 'error');
      }
    }

    document.getElementById('sv-new-proyecto-btn').addEventListener('click', () => {
      document.getElementById('sv-proyecto-id').value = '';
      document.getElementById('sv-proyecto-form').reset();
      openModal('Nuevo proyecto');
    });

    document.getElementById('sv-modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('sv-modal-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('sv-modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // Submit nuevo/editar
    document.getElementById('sv-proyecto-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('sv-modal-alert');
      clearFieldErrors('sv-proyecto-form');

      const id = document.getElementById('sv-proyecto-id').value;
      const etiquetasRaw = document.getElementById('proj-etiquetas').value;
      const etiquetas = etiquetasRaw ? etiquetasRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

      const payload = {
        titulo:       document.getElementById('proj-titulo').value.trim(),
        categoria:    document.getElementById('proj-categoria').value,
        descripcion:  document.getElementById('proj-descripcion').value.trim(),
        fecha_inicio: document.getElementById('proj-fecha-inicio').value || null,
        fecha_fin:    document.getElementById('proj-fecha-fin').value || null,
        etiquetas,
      };

      const submitBtn = document.getElementById('sv-modal-submit-btn');
      setButtonLoading(submitBtn, true);

      try {
        if (id) {
          await API.patch(`/api/proyectos/${id}/`, payload);
          showAlert('sv-panel-alert', 'Proyecto actualizado.', 'success');
        } else {
          await API.post('/api/proyectos/', payload);
          showAlert('sv-panel-alert', 'Proyecto creado exitosamente.', 'success');
        }
        closeModal();
        loadPanel();
      } catch (err) {
        setButtonLoading(submitBtn, false);
        const fieldErrors = err.getFieldErrors?.() || {};
        if (Object.keys(fieldErrors).length > 0) {
          showFieldErrors(fieldErrors, 'sv-proyecto-form');
        } else {
          showAlert('sv-modal-alert', err.message || 'Error al guardar.', 'error');
        }
      }
    });

    // Filtros
    document.getElementById('sv-panel-search').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { state.q = e.target.value.trim(); state.page = 1; loadPanel(); }, 400);
    });
    document.getElementById('sv-vis-filter').addEventListener('change', (e) => {
      state.visibilidad = e.target.value; state.page = 1; loadPanel();
    });
    document.getElementById('sv-cat-filter').addEventListener('change', (e) => {
      state.categoria = e.target.value; state.page = 1; loadPanel();
    });

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    loadPanel();
  </script>
</body>
</html>
