<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Satellite body -->
  <g transform="translate(8, 12)">
    <!-- Solar panels left -->
    <rect x="0" y="14" width="18" height="10" rx="1" fill="#00D4FF" opacity="0.9"/>
    <rect x="1" y="15" width="16" height="1.5" fill="#0099BB" opacity="0.6"/>
    <rect x="1" y="17.5" width="16" height="1.5" fill="#0099BB" opacity="0.6"/>
    <rect x="1" y="20" width="16" height="1.5" fill="#0099BB" opacity="0.6"/>
    <!-- Connector left -->
    <rect x="18" y="17.5" width="5" height="3" fill="#888"/>
    <!-- Main body -->
    <rect x="23" y="10" width="20" height="18" rx="3" fill="#1A2A4A"/>
    <rect x="25" y="12" width="16" height="14" rx="2" fill="#243354"/>
    <!-- Antenna -->
    <line x1="33" y1="10" x2="33" y2="4" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="33" cy="3" r="2" fill="#00D4FF" opacity="0.8"/>
    <!-- Dish -->
    <ellipse cx="38" cy="8" rx="5" ry="3" stroke="#00D4FF" stroke-width="1.2" fill="none"/>
    <line x1="38" y1="8" x2="44" y2="13" stroke="#00D4FF" stroke-width="1"/>
    <!-- Connector right -->
    <rect x="43" y="17.5" width="5" height="3" fill="#888"/>
    <!-- Solar panels right -->
    <rect x="48" y="14" width="18" height="10" rx="1" fill="#00D4FF" opacity="0.9"/>
    <rect x="49" y="15" width="16" height="1.5" fill="#0099BB" opacity="0.6"/>
    <rect x="49" y="17.5" width="16" height="1.5" fill="#0099BB" opacity="0.6"/>
    <rect x="49" y="20" width="16" height="1.5" fill="#0099BB" opacity="0.6"/>
    <!-- Signal beam pointing right-down -->
    <line x1="43" y1="22" x2="64" y2="35" stroke="#00D4FF" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <line x1="43" y1="24" x2="68" y2="40" stroke="#00D4FF" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  </g>

  <!-- SIVAG text as geospatial layers -->
  <g transform="translate(82, 8)">
    <!-- Layer shadow effect for each letter -->
    <!-- S -->
    <text x="0" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0A4A6B" opacity="0.3" transform="translate(3,3)">S</text>
    <text x="0" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0D6B8F" opacity="0.5" transform="translate(1.5,1.5)">S</text>
    <text x="0" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="url(#layerGradS)">S</text>

    <!-- I -->
    <text x="30" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0A4A6B" opacity="0.3" transform="translate(3,3)">I</text>
    <text x="30" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0D6B8F" opacity="0.5" transform="translate(1.5,1.5)">I</text>
    <text x="30" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="url(#layerGradI)">I</text>

    <!-- V -->
    <text x="44" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0A4A6B" opacity="0.3" transform="translate(3,3)">V</text>
    <text x="44" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0D6B8F" opacity="0.5" transform="translate(1.5,1.5)">V</text>
    <text x="44" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="url(#layerGradV)">V</text>

    <!-- A -->
    <text x="72" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0A4A6B" opacity="0.3" transform="translate(3,3)">A</text>
    <text x="72" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0D6B8F" opacity="0.5" transform="translate(1.5,1.5)">A</text>
    <text x="72" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="url(#layerGradA)">A</text>

    <!-- G -->
    <text x="102" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0A4A6B" opacity="0.3" transform="translate(3,3)">G</text>
    <text x="102" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#0D6B8F" opacity="0.5" transform="translate(1.5,1.5)">G</text>
    <text x="102" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="url(#layerGradG)">G</text>

    <!-- Subtitle -->
    <text x="0" y="62" font-family="'Courier New', monospace" font-size="9" fill="#00D4FF" letter-spacing="3" opacity="0.9">SISTEMA DE VISUALIZACIÓN GEOESPACIAL</text>
  </g>

  <defs>
    <linearGradient id="layerGradS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="40%" stop-color="#00AACC"/>
      <stop offset="70%" stop-color="#0077AA"/>
      <stop offset="100%" stop-color="#005588"/>
    </linearGradient>
    <linearGradient id="layerGradI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="40%" stop-color="#00AACC"/>
      <stop offset="70%" stop-color="#0077AA"/>
      <stop offset="100%" stop-color="#005588"/>
    </linearGradient>
    <linearGradient id="layerGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="40%" stop-color="#00AACC"/>
      <stop offset="70%" stop-color="#0077AA"/>
      <stop offset="100%" stop-color="#005588"/>
    </linearGradient>
    <linearGradient id="layerGradA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="40%" stop-color="#00AACC"/>
      <stop offset="70%" stop-color="#0077AA"/>
      <stop offset="100%" stop-color="#005588"/>
    </linearGradient>
    <linearGradient id="layerGradG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="40%" stop-color="#00AACC"/>
      <stop offset="70%" stop-color="#0077AA"/>
      <stop offset="100%" stop-color="#005588"/>
    </linearGradient>
  </defs>
</svg>
