<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — SIVAG</title>
  <link rel="stylesheet" href="css/sivag.css" />
  <style>
    .sv-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 520px) {
      .sv-form-row { grid-template-columns: 1fr; }
    }
    .sv-step-content { display: none; }
    .sv-step-content.active { display: block; animation: fadeInUp 0.35s ease; }
  </style>
</head>
<body>
  <div class="sv-bg-grid"></div>
  <div class="sv-bg-orb sv-bg-orb-1"></div>
  <div class="sv-bg-orb sv-bg-orb-2"></div>

  <div class="sv-auth-page" style="align-items:flex-start;padding-top:60px;">
    <div class="sv-auth-container sv-page" style="max-width:520px;">

      <a href="index.html">
        <img src="assets/logo.svg" alt="SIVAG" class="sv-auth-logo" />
      </a>

      <div class="sv-auth-card">
        <!-- Stepper -->
        <div class="sv-stepper" id="sv-stepper">
          <div class="sv-step active" id="step-indicator-1">
            <div class="sv-step-num">1</div>
            <span class="sv-step-label">Tipo</span>
          </div>
          <div class="sv-step" id="step-indicator-2">
            <div class="sv-step-num">2</div>
            <span class="sv-step-label">Datos</span>
          </div>
          <div class="sv-step" id="step-indicator-3">
            <div class="sv-step-num">3</div>
            <span class="sv-step-label">Listo</span>
          </div>
        </div>

        <div id="sv-alert-container"></div>

        <!-- PASO 1: Selección de tipo -->
        <div class="sv-step-content active" id="sv-step-1">
          <h1 class="sv-auth-title">Crear cuenta</h1>
          <p class="sv-auth-subtitle">¿Cuál es tu perfil?</p>

          <div class="sv-role-selector">
            <div class="sv-role-option">
              <input type="radio" name="tipo_usuario" id="tipo-investigador" value="INVESTIGADOR" checked />
              <label class="sv-role-label" for="tipo-investigador">
                <span class="sv-role-icon">🔬</span>
                <span class="sv-role-name">Investigador</span>
                <span class="sv-role-desc">Sube y publica datos geoespaciales</span>
              </label>
            </div>
            <div class="sv-role-option">
              <input type="radio" name="tipo_usuario" id="tipo-normal" value="NORMAL" />
              <label class="sv-role-label" for="tipo-normal">
                <span class="sv-role-icon">🌐</span>
                <span class="sv-role-name">Usuario</span>
                <span class="sv-role-desc">Explora y analiza proyectos públicos</span>
              </label>
            </div>
          </div>

          <button type="button" class="sv-btn sv-btn-primary sv-btn-block sv-btn-lg" id="sv-next-btn">
            Continuar →
          </button>

          <div class="sv-divider-text">¿Ya tienes cuenta?</div>
          <a href="login.html" class="sv-btn sv-btn-outline sv-btn-block">Iniciar sesión</a>
        </div>

        <!-- PASO 2: Formulario -->
        <div class="sv-step-content" id="sv-step-2">
          <h1 class="sv-auth-title" id="sv-form-title">Datos del Investigador</h1>
          <p class="sv-auth-subtitle" id="sv-form-subtitle">Completa tu información</p>

          <form id="sv-registro-form" novalidate>
            <div class="sv-form-row">
              <div class="sv-form-group">
                <label class="sv-label" for="first_name">Nombre(s)</label>
                <input type="text" id="first_name" name="first_name" class="sv-input" placeholder="Ana" required />
                <span class="sv-field-error" id="first_name-error" data-error="first_name"></span>
              </div>
              <div class="sv-form-group">
                <label class="sv-label" for="last_name">Apellidos</label>
                <input type="text" id="last_name" name="last_name" class="sv-input" placeholder="García" required />
                <span class="sv-field-error" id="last_name-error" data-error="last_name"></span>
              </div>
            </div>

            <!-- Campo especialidad — solo investigador -->
            <div class="sv-form-group" id="sv-especialidad-group">
              <label class="sv-label" for="especialidad">Especialidad</label>
              <input type="text" id="especialidad" name="especialidad" class="sv-input" placeholder="Teledetección, SIG, Hidrología..." />
              <span class="sv-field-error" id="especialidad-error" data-error="especialidad"></span>
            </div>

            <div class="sv-form-group">
              <label class="sv-label" for="fecha_nacimiento">Fecha de nacimiento</label>
              <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" class="sv-input" required />
              <span class="sv-field-error" id="fecha_nacimiento-error" data-error="fecha_nacimiento"></span>
            </div>

            <div class="sv-form-group">
              <label class="sv-label" for="username">Nombre de usuario</label>
              <div class="sv-input-icon">
                <span class="sv-icon">@</span>
                <input type="text" id="username" name="username" class="sv-input" placeholder="ana_garcia" autocomplete="username" required />
              </div>
              <span class="sv-field-error" id="username-error" data-error="username"></span>
            </div>

            <div class="sv-form-group">
              <label class="sv-label" for="email">Correo electrónico</label>
              <div class="sv-input-icon">
                <span class="sv-icon">✉</span>
                <input type="email" id="email" name="email" class="sv-input" placeholder="ana@ejemplo.com" autocomplete="email" required />
              </div>
              <span class="sv-field-error" id="email-error" data-error="email"></span>
            </div>

            <div class="sv-form-group">
              <label class="sv-label" for="password">Contraseña</label>
              <div class="sv-input-icon">
                <span class="sv-icon">🔑</span>
                <input type="password" id="password" name="password" class="sv-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
                <button type="button" class="sv-eye-toggle" id="sv-eye-1" aria-label="Ver contraseña">👁</button>
              </div>
              <div class="sv-pw-strength">
                <div class="sv-pw-bar" id="pw-bar-1"></div>
                <div class="sv-pw-bar" id="pw-bar-2"></div>
                <div class="sv-pw-bar" id="pw-bar-3"></div>
                <div class="sv-pw-bar" id="pw-bar-4"></div>
              </div>
              <span class="sv-field-error" id="password-error" data-error="password"></span>
            </div>

            <div class="sv-form-group">
              <label class="sv-label" for="password2">Confirmar contraseña</label>
              <div class="sv-input-icon">
                <span class="sv-icon">🔑</span>
                <input type="password" id="password2" name="password2" class="sv-input" placeholder="Repite tu contraseña" autocomplete="new-password" required />
                <button type="button" class="sv-eye-toggle" id="sv-eye-2" aria-label="Ver contraseña">👁</button>
              </div>
              <span class="sv-field-error" id="password2-error" data-error="password2"></span>
            </div>

            <div style="display:flex;gap:12px;margin-top:4px;">
              <button type="button" class="sv-btn sv-btn-ghost" id="sv-back-btn" style="flex:0 0 auto;">
                ← Atrás
              </button>
              <button type="submit" class="sv-btn sv-btn-primary sv-btn-block sv-btn-lg" id="sv-submit-btn">
                ◈ Crear cuenta
              </button>
            </div>
          </form>
        </div>

        <!-- PASO 3: Éxito -->
        <div class="sv-step-content" id="sv-step-3">
          <div style="text-align:center;padding:20px 0;">
            <div style="font-size:56px;margin-bottom:16px;">🛰</div>
            <h1 class="sv-auth-title">¡Cuenta creada!</h1>
            <p style="color:var(--text-secondary);font-size:14px;margin:12px 0 28px;">
              Tu cuenta SIVAG ha sido creada exitosamente.<br>
              Ya puedes iniciar sesión y comenzar a explorar.
            </p>
            <a href="login.html" class="sv-btn sv-btn-primary sv-btn-block sv-btn-lg">
              Iniciar sesión →
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { registroInvestigador, registroNormal } from './js/auth.js';
    import { Router } from './js/router.js';
    import { showAlert, clearAlert, showFieldErrors, clearFieldErrors, setButtonLoading } from './js/ui.js';

    Router.redirectIfAuthenticated();

    let currentRole = 'INVESTIGADOR';
    let currentStep = 1;

    // Paso 1: seleccionar tipo
    document.getElementById('sv-next-btn').addEventListener('click', () => {
      currentRole = document.querySelector('input[name="tipo_usuario"]:checked')?.value || 'INVESTIGADOR';
      setStep(2);

      // Ajustar UI según rol
      const isInv = currentRole === 'INVESTIGADOR';
      document.getElementById('sv-form-title').textContent     = isInv ? 'Datos del Investigador' : 'Datos del Usuario';
      document.getElementById('sv-especialidad-group').style.display = isInv ? 'block' : 'none';
      document.getElementById('especialidad').required = isInv;
    });

    // Paso 2: volver
    document.getElementById('sv-back-btn').addEventListener('click', () => setStep(1));

    function setStep(n) {
      currentStep = n;
      document.querySelectorAll('.sv-step-content').forEach((el, i) => {
        el.classList.toggle('active', i + 1 === n);
      });
      // Stepper indicators
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById(`step-indicator-${i}`);
        el.classList.toggle('active', i === n);
        el.classList.toggle('completed', i < n);
      }
    }

    // Toggle contraseñas
    function makeEyeToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const inp = document.getElementById(inputId);
        inp.type = inp.type === 'text' ? 'password' : 'text';
        document.getElementById(btnId).textContent = inp.type === 'text' ? '🙈' : '👁';
      });
    }
    makeEyeToggle('sv-eye-1', 'password');
    makeEyeToggle('sv-eye-2', 'password2');

    // Fuerza de contraseña
    document.getElementById('password').addEventListener('input', function () {
      const v = this.value;
      const score = [
        v.length >= 8,
        /[A-Z]/.test(v),
        /[0-9]/.test(v),
        /[^A-Za-z0-9]/.test(v),
      ].filter(Boolean).length;

      const classes = ['', 'weak', 'fair', 'good', 'strong'];
      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById(`pw-bar-${i}`);
        bar.className = 'sv-pw-bar';
        if (i <= score) bar.classList.add(classes[score]);
      }
    });

    // Submit registro
    const form = document.getElementById('sv-registro-form');
    const submitBtn = document.getElementById('sv-submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('sv-alert-container');
      clearFieldErrors('sv-registro-form');

      const data = {
        first_name:       document.getElementById('first_name').value.trim(),
        last_name:        document.getElementById('last_name').value.trim(),
        username:         document.getElementById('username').value.trim(),
        email:            document.getElementById('email').value.trim(),
        fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
        password:         document.getElementById('password').value,
        password2:        document.getElementById('password2').value,
      };

      if (currentRole === 'INVESTIGADOR') {
        data.especialidad = document.getElementById('especialidad').value.trim();
      }

      // Validación básica
      if (data.password !== data.password2) {
        showFieldErrors({ password2: 'Las contraseñas no coinciden.' });
        return;
      }

      setButtonLoading(submitBtn, true);

      try {
        if (currentRole === 'INVESTIGADOR') {
          await registroInvestigador(data);
        } else {
          await registroNormal(data);
        }

        setStep(3);
      } catch (err) {
        setButtonLoading(submitBtn, false);
        const fieldErrors = err.getFieldErrors?.() || {};
        if (Object.keys(fieldErrors).length > 0) {
          showFieldErrors(fieldErrors, 'sv-registro-form');
        } else {
          showAlert('sv-alert-container', err.message || 'Error al crear la cuenta.', 'error');
        }
      }
    });
  </script>
</body>
</html>
